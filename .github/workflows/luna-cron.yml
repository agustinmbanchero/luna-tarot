name: Luna Cron
on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos (mínimo de GitHub Actions)
  workflow_dispatch:        # permite ejecutarlo manualmente también

jobs:
  trigger-luna:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Luna cron endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://luna-tarot-liart.vercel.app/api/cron
